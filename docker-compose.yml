services:
  app:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - .:/workspace                       # código editable en caliente, sin rebuild
    command: sleep infinity                # mantiene el contenedor vivo; entramos con `exec`
    depends_on:
      - postgres
      - minio
    env_file:
      - .env

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data   # sin esto, se pierde la DB al recrear el contenedor
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"                        # API S3
      - "9001:9001"                        # consola web

volumes:
  pgdata:
  miniodata:
