name: ETL Vehículos Semanal

on:
  schedule:
    # Domingos 06:00 UTC = 03:00 Argentina
    - cron: "0 6 * * 0"
  workflow_dispatch:  # permite correrlo manualmente desde GitHub

permissions:
  id-token: write   # necesario para OIDC → AWS
  contents: read

jobs:

  # ── Job 1: scrape + transform + load ─────────────────────────────────────
  scrape-transform-load:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # scrape completo puede tardar 3-5h

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-etl.txt

      - name: Instalar dependencias ETL
        run: pip install -r requirements-etl.txt

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ETL_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 21600  # 6h — el scraper completo puede tardar 3-5h

      - name: Scrape DeRuedas → bronze
        env:
          MINIO_BUCKET: tasajusta-datalake-966940665955
        run: python -m etl.scrape_deruedas

      - name: Transform bronze → silver
        env:
          MINIO_BUCKET: tasajusta-datalake-966940665955
        run: python -m etl.transform_autos

      - name: Load silver → Supabase
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m etl.load_autos

  # ── Job 2: gold + retrain ─────────────────────────────────────────────────
  retrain:
    needs: scrape-transform-load   # espera que el ETL termine con éxito
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-train.txt

      - name: Instalar dependencias ML
        run: pip install -r requirements-train.txt

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ETL_ROLE_ARN }}
          aws-region: us-east-1

      - name: Gold silver → gold (feature engineering)
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m etl.gold_autos

      - name: Entrenar modelo LightGBM → S3
        env:
          MINIO_BUCKET:  tasajusta-datalake-966940665955
          MODELS_BUCKET: tasajusta-models-966940665955
        run: python -m ml.train_lgbm

      - name: Scoring oportunidades → Supabase
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          MODELS_BUCKET:        tasajusta-models-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m ml.score_autos
