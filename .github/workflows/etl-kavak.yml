name: ETL Kavak Diario

on:
  schedule:
    # Lunes a viernes 10:00 UTC = 07:00 Argentina
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

  # ── Job 1: scrape + transform + load ─────────────────────────────────────
  scrape-transform-load:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/etl.txt

      - name: Instalar dependencias ETL
        run: pip install -r requirements/etl.txt

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ETL_ROLE_ARN }}
          aws-region: us-east-1

      - name: Scrape Kavak via Lambda → bronze
        run: |
          aws lambda invoke \
            --function-name tasajusta-kavak \
            --payload '{}' \
            --cli-binary-format raw-in-base64-out \
            --region us-east-1 \
            response.json
          python3 -c "
          import json, sys
          r = json.load(open('response.json'))
          if 'errorType' in r:
              print('Lambda runtime error:', r.get('errorMessage', 'unknown'))
              sys.exit(1)
          if r.get('statusCode', 500) != 200:
              print('Lambda Kavak falló:', json.dumps(r, indent=2))
              sys.exit(1)
          print('Lambda Kavak OK')
          "

      - name: Transform bronze → silver
        env:
          MINIO_BUCKET: tasajusta-datalake-966940665955
        run: python -m etl.transform_kavak

      - name: Load Kavak silver → Supabase
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOURCE:               kavak
        run: python -m etl.load_autos

  # ── Job 2: gold + retrain con datos frescos ───────────────────────────────
  retrain:
    needs: scrape-transform-load
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/train.txt

      - name: Instalar dependencias ML
        run: pip install -r requirements/train.txt

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ETL_ROLE_ARN }}
          aws-region: us-east-1

      - name: Gold silver → gold (feature engineering)
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m etl.gold_autos

      - name: Entrenar modelo LightGBM → S3
        env:
          MINIO_BUCKET:  tasajusta-datalake-966940665955
          MODELS_BUCKET: tasajusta-models-966940665955
        run: python -m ml.train_lgbm

      - name: Scoring oportunidades → Supabase
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          MODELS_BUCKET:        tasajusta-models-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m ml.score_autos
