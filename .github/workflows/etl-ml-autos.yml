name: ETL MercadoLibre Diario

on:
  schedule:
    # Lunes a viernes 10:00 UTC = 07:00 Argentina
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

  # ── Job 1: extract + transform + load ────────────────────────────────────
  extract-transform-load:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/etl.txt

      - name: Instalar dependencias ETL
        run: pip install -r requirements/etl.txt

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ETL_ROLE_ARN }}
          aws-region: us-east-1

      - name: Extract MercadoLibre → bronze
        env:
          MINIO_BUCKET:     tasajusta-datalake-966940665955
          ML_CLIENT_ID:     ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
        run: python -m etl.extract_ml_autos

      - name: Transform ML bronze → silver
        env:
          MINIO_BUCKET: tasajusta-datalake-966940665955
        run: python -m etl.transform_ml_autos

      - name: Load ML silver → Supabase
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOURCE:               mercadolibre
        run: python -m etl.load_autos

  # ── Job 2: retrain con datos frescos ─────────────────────────────────────
  retrain:
    needs: extract-transform-load
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/train.txt

      - name: Instalar dependencias ML
        run: pip install -r requirements/train.txt

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ETL_ROLE_ARN }}
          aws-region: us-east-1

      - name: Gold silver → gold (feature engineering)
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m etl.gold_autos

      - name: Entrenar modelo LightGBM → S3
        env:
          MINIO_BUCKET:  tasajusta-datalake-966940665955
          MODELS_BUCKET: tasajusta-models-966940665955
        run: python -m ml.train_lgbm

      - name: Scoring oportunidades → Supabase
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          MODELS_BUCKET:        tasajusta-models-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m ml.score_autos
