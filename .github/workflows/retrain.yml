name: Retrain LightGBM

on:
  workflow_dispatch:  # solo manual — lo dispara el ETL o vos directamente

permissions:
  id-token: write
  contents: read

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-train.txt

      - name: Instalar dependencias ML
        run: pip install -r requirements-train.txt

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ETL_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 3600

      - name: Gold silver → gold (feature engineering)
        env:
          MINIO_BUCKET:         tasajusta-datalake-966940665955
          SUPABASE_URL:         https://rcmxwfmemhvjynorrpnd.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m etl.gold_autos

      - name: Entrenar modelo LightGBM → S3
        env:
          MINIO_BUCKET:  tasajusta-datalake-966940665955
          MODELS_BUCKET: tasajusta-models
        run: python -m ml.train_lgbm
