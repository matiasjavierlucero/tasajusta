repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff          # linter: detecta errores e imports desordenados
        args: [--fix]     # corrige lo que puede automáticamente
      - id: ruff-format   # formatter: aplica estilo consistente (como Black)
